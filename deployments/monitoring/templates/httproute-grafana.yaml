# Exposes Grafana via the shared homelab Envoy gateway (:80) at http://grafana.attat.org/
# (DNS A-record grafana.attat.org -> 192.168.1.129). Grafana's Service is pinned to `grafana`
# via grafana.fullnameOverride in values.yaml; its default Service port is 80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - grafana.attat.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 80
