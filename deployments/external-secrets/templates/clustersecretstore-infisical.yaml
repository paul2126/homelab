{{- if .Values.infisical.enabled }}
# Cluster-wide SecretStore that pulls from the self-hosted Infisical. Any namespace can then
# create an ExternalSecret referencing `kind: ClusterSecretStore, name: infisical` to materialise
# a Kubernetes Secret from Infisical. Auth uses an Infisical Universal-Auth machine identity whose
# clientId/clientSecret live in the infisical-universal-auth secret (external-secrets namespace).
# sync-wave 1 so it applies after the ESO operator + webhook are up.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    infisical:
      hostAPI: {{ .Values.infisical.hostAPI | quote }}
      auth:
        universalAuthCredentials:
          clientId:
            name: {{ .Values.infisical.authSecretName | quote }}
            namespace: {{ .Values.infisical.authSecretNamespace | quote }}
            key: clientId
          clientSecret:
            name: {{ .Values.infisical.authSecretName | quote }}
            namespace: {{ .Values.infisical.authSecretNamespace | quote }}
            key: clientSecret
      secretsScope:
        projectSlug: {{ .Values.infisical.projectSlug | quote }}
        environmentSlug: {{ .Values.infisical.environmentSlug | quote }}
        secretsPath: {{ .Values.infisical.secretsPath | quote }}
        recursive: {{ .Values.infisical.recursive }}
{{- end }}
