# Attaches vLLM to the shared homelab Envoy gateway. External clients reach the OpenAI API at
#   http://<gateway-ip>/v1/...      (or http://vllm.attat.org/v1/... with a DNS A-record)
# The gateway listens on :80 and routes to the in-cluster vllm-llama Service on :8000.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm-llama
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: vllm-llama
          port: 8000
      # vLLM streams tokens (SSE); the default request timeout is 15s, which would truncate
      # long generations. Allow up to 1h for a full streamed response.
      timeouts:
        request: "3600s"
        backendRequest: "3600s"
