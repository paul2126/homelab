# vLLM serving Llama 3.1 8B Instruct (4-bit AWQ-INT4), OpenAI-compatible API on :8000.
# Plain manifests applied by an ArgoCD directory source (same pattern as cilium-lb).
# GPU memory is managed by HAMi (nvidia.com/gpumem) so the GPU is shared with other services.
# Tunables (model, context length, VRAM slice) live in the container args and resources below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama
  labels:
    app.kubernetes.io/name: vllm-llama
spec:
  replicas: 1
  # Single GPU — never run two pods at once (the new pod can't get the GPU until the old
  # one releases it).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-llama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-llama
    spec:
      # nvidia RuntimeClass is still registered by the GPU Operator's container-toolkit.
      # HAMi's device plugin intercepts scheduling and injects its vGPU library; the runtime
      # itself remains nvidia so CUDA works normally inside the slice.
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.22.1
          args:
            - --model
            - hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4   # open repo, no HF token
            - --quantization
            - awq_marlin                                           # Marlin kernels (Ampere+); generic "awq" is ~10x slower (compute-bound dequant). This IS the Int4 checkpoint.
            # TUNED FOR CONCURRENT batched serving (receipt-OCR service: bulk uploads call Llama outside
            # the OCR lock, so many requests share a batch). Continuous batching is on by default; the KV
            # weight-read is amortised across the batch, so aggregate tok/s scales well past the ~65 tok/s
            # single-stream roofline. EAGLE3 speculative decoding stays OFF: its FP16 draft head mispredicts
            # the AWQ-INT4 target (acceptance only ~2/4) and competes for compute — a net loss here even
            # under load. awq_marlin + continuous batching is the right combo for this GPU.
            - --enforce-eager                                       # skip CUDA-graph capture (saves ~512 MB–1 GB of VRAM that graph capture pre-allocates across batch sizes)
            - --max-model-len
            - "4096"                                               # receipts fit easily (~930 prompt + ≤1024 output)
            - --gpu-memory-utilization
            - "0.90"                                               # 90% of the HAMi slice (not the whole GPU); remaining 10% is headroom so HAMi's limit isn't hit
            - --max-num-seqs
            - "8"                                                  # low concurrency — VRAM slice is much smaller than the full GPU; KV pool is limited
            - --dtype
            - half
            - --served-model-name
            - llama-3.1-8b                                         # the model id clients use
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "2"
              memory: 6Gi      # the 8B model lives in GPU VRAM; host RAM is just the process
            limits:
              # HAMi resource: fractional VRAM slice in MiB. AWQ-INT4 weights ~4.5 GB;
              # 7168 MiB = 7 GB gives ~2.5 GB headroom for KV cache + CUDA context.
              # Adjust based on your GPU's total VRAM (e.g. 8192 on a 12 GB card).
              nvidia.com/gpumem: "7168"
              memory: 10Gi
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          # First start pulls a 10.7 GB image + downloads (~6 GB) and loads the model — can
          # take 10-20 min. The startupProbe gates liveness/readiness until that completes,
          # so liveness can't kill the pod mid-load (which would restart and re-download).
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 80          # ~20 min budget for first pull + load
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-llama-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
