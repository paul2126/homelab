# OpenAI-compatible API. Reachable in-cluster at
# http://vllm-llama.vllm.svc.cluster.local:8000/v1  (model: llama-3.1-8b)
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama
  labels:
    app.kubernetes.io/name: vllm-llama
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm-llama
  ports:
    - name: http
      port: 8000
      targetPort: http
