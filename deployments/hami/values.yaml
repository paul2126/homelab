# Values for the upstream hami subchart are nested under its dependency name.
hami:
  scheduler:
    kubeScheduler:
      # Upstream defaults the bundled kube-scheduler to an Alibaba China mirror
      # (registry.cn-hangzhou.aliyuncs.com), which is slow/unreachable outside China.
      # Pull from the official registry instead. Keep the tag aligned with the chart's
      # bundled scheduler version (ideally close to your control-plane version).
      image:
        registry: registry.k8s.io
        repository: kube-scheduler
        tag: "v1.34.0"

  devicePlugin:
    # Tell HAMi that GPU Operator manages the NVIDIA toolkit so it waits for the toolkit
    # validation file before starting and uses the correct NVML library path.
    gpuOperatorToolkitReady:
      enabled: true
      hostPath: "/run/nvidia/validations"
    # GPU Operator installs the driver at /run/nvidia/driver on the host (not /usr/local/nvidia).
    # HAMi needs this to find libnvidia-ml.so for GPU discovery.
    nvidiaDriverRoot: "/run/nvidia/driver"
