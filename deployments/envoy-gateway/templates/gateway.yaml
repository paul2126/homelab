# The shared homelab gateway: one HTTP listener on :80, accepting HTTPRoutes from any
# namespace (so each app brings its own route). The controller provisions an Envoy
# Deployment + a LoadBalancer Service (which gets a Cilium LB-IPAM IP) for this Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
