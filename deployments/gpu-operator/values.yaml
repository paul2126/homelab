# Values for the upstream gpu-operator subchart are nested under its dependency name.
gpu-operator:
  # The operator installs and manages the NVIDIA driver on the GPU node (no host prep).
  # First rollout blacklists nouveau, builds/loads the module, and may reboot the node once.
  driver:
    enabled: true

  # Single consumer GPU — no Multi-Instance GPU.
  migManager:
    enabled: false

  # No Prometheus Operator in the cluster yet, so don't emit a ServiceMonitor.
  dcgmExporter:
    serviceMonitor:
      enabled: false

  # HAMi provides its own device plugin that advertises nvidia.com/gpumem / nvidia.com/gpucores
  # for fractional GPU sharing. Disable the operator's plugin so they don't race.
  devicePlugin:
    enabled: false

  # Enable CDI (Container Device Interface) so the toolkit generates spec files at
  # /var/run/cdi/. HAMi's embedded nvidia-device-plugin uses CDI for GPU discovery
  # because NVML isn't directly loadable inside the device-plugin container.
  toolkit:
    env:
      - name: ENABLE_CDI
        value: "true"

  # toolkit, nfd (node-feature-discovery), and gfd (GPU feature discovery) remain enabled —
  # they provide the nvidia containerd runtime and GPU node labels. HAMi handles the resource.
