# Cilium L2 announcement policy: which interfaces ARP-announce LoadBalancer IPs.
# The L2 announcement *feature* must be enabled in Kubespray (cilium_l2announcements:
# true) for this policy to take effect — Kubespray has no var for this CR itself.
# `interfaces` must match the nodes' real NIC names (check with `ip link` on a node).
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2-policy
spec:
  loadBalancerIPs: true
  interfaces:
    - ^eth0