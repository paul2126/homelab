# Routes argocd.attat.org through the shared homelab Envoy gateway.
# ArgoCD server runs in insecure mode (server.insecure=true in values.yaml) so it
# serves plain HTTP on port 80 — no TLS bump needed at the service level.
# DNS: argocd.attat.org -> 192.168.1.129 (same A-record as all other homelab services)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - argocd.attat.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
