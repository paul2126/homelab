# Values for the upstream argo-cd subchart are nested under its dependency name.
argo-cd:
  server:
    service:
      type: ClusterIP   # was LoadBalancer; now fronted by homelab-gateway via HTTPRoute
  configs:
    params:
      # Serve plain HTTP so Envoy Gateway can proxy without TLS termination tricks.
      # The gateway is the TLS boundary (once TLS is added); ArgoCD stays internal-only.
      server.insecure: "true"
  # Unused components — disabled to save RAM (no SSO, no notifications).
  # (the applicationSet controller is a core component in this chart and can't be disabled.)
  dex:
    enabled: false
  notifications:
    enabled: false
