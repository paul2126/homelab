# Attaches n8n to the shared homelab Envoy gateway, replacing the old (unused) Cilium Ingress.
# The gateway listens on :80 and routes Host: n8n.attat.org to the in-cluster n8n Service on
# :5678. n8n sets N8N_SECURE_COOKIE=false (values.yaml), so plain HTTP works until TLS is added.
#   http://n8n.attat.org/   (DNS A-record n8n.attat.org -> 192.168.1.129)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - n8n.attat.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: n8n
          port: 5678
