apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/paul2126/homelab.git
    targetRevision: main
    path: infra/overlays/prod/cilium
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  
  # Cilium continuously self-modifies cilium-config ConfigMap at runtime (e.g. node-specific configs).
  # Using managedFieldsManagers instead of jsonPointers:/data so ArgoCD only ignores fields
  # written by Cilium's own controllers, while still applying our Helm value changes correctly.
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: cilium-config
      managedFieldsManagers:
        - cilium-operator
        - cilium
    # cilium-ingress Endpoints is auto-created by Cilium's ingress controller.
    # ArgoCD excludes all Endpoints globally by default, so this suppresses the warning.
    - group: ""
      kind: Endpoints
      name: cilium-ingress

  syncPolicy:
    syncOptions:
      # Required for managedFieldsManagers to work correctly — tracks field ownership
      # per manager so ArgoCD and Cilium don't clobber each other's fields.
      - ServerSideApply=true
