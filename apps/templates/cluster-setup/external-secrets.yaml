apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/paul2126/homelab.git
    targetRevision: main
    path: deployments/external-secrets
    helm:
      releaseName: external-secrets
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  # The built-in cert-controller rotates the webhook's TLS cert + injects the caBundle at
  # runtime, so those fields perpetually differ from git — ignore them to stay in Sync.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: ""
      kind: Secret
      name: external-secrets-webhook
      namespace: external-secrets
      jsonPointers:
        - /data
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      # ESO ships large CRDs; SSA avoids the client-side apply annotation size limit.
      - ServerSideApply=true
      # The ClusterSecretStore CR is applied alongside its CRD on the first sync.
      - SkipDryRunOnMissingResource=true
