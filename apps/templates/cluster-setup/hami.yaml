apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hami
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/paul2126/homelab.git
    targetRevision: main
    path: deployments/hami
    helm:
      releaseName: hami
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hami
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # HAMi ships webhook and scheduler CRDs alongside the deployment — skip dry-run
      # on the first sync before those CRDs exist.
      - SkipDryRunOnMissingResource=true
