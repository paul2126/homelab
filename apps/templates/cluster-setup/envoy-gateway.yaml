apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paul2126/homelab.git
    targetRevision: main
    path: deployments/envoy-gateway
    helm:
      releaseName: envoy-gateway
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Gateway API + Envoy Gateway CRDs are large; SSA avoids the client-side apply limit.
      - ServerSideApply=true
      # GatewayClass/Gateway/EnvoyProxy CRs are applied alongside their CRDs.
      - SkipDryRunOnMissingResource=true
